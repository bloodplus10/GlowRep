<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOWREP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #f0f0f0;
            font-family: 'Impact', 'Arial Black', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .screen { display: none; padding: 16px; }
        .screen.active { display: block; }

        .header { text-align: center; margin-bottom: 20px; padding-top: 8px; }
        .logo { font-size: 48px; font-weight: 900; font-style: italic; text-shadow: 5px 5px 0 #e63946; letter-spacing: -1px; }
        .subtitle { color: #e63946; font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-top: 2px; }

        /* ===== ПОИСК + ФИЛЬТРЫ ===== */
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .search-bar {
            flex: 1;
            background: #111; border: 3px solid #222; padding: 14px 16px;
            color: #fff; font-size: 15px; font-family: 'Impact', sans-serif;
            outline: none;
        }
        .search-bar:focus { border-color: #e63946; }
        .search-bar::placeholder { color: #444; }

        .filter-btn-search {
            background: #111;
            border: 3px solid #222;
            color: #fff;
            padding: 14px 16px;
            font-size: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-btn-search.active { border-color: #e63946; background: #1a1a1a; }

        /* Активные фильтры */
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            min-height: 0;
        }
        .active-filter-tag {
            background: #e63946;
            color: #fff;
            padding: 6px 12px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .active-filter-tag span { font-size: 14px; }

        /* ===== ПАНЕЛЬ ФИЛЬТРОВ ===== */
        .filter-panel {
            display: none;
            background: #0a0a0a;
            border: 3px solid #222;
            padding: 16px;
            margin-bottom: 16px;
        }
        .filter-panel.open { display: block; }

        .filter-section { margin-bottom: 16px; }
        .filter-section:last-child { margin-bottom: 0; }
        .filter-section-title {
            color: #e63946;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 900;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .filter-chip {
            background: #111;
            border: 2px solid #222;
            color: #888;
            padding: 8px 14px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .filter-chip.selected { border-color: #e63946; color: #fff; background: #1a1a1a; }

        .price-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .price-input {
            width: 100%;
            background: #111;
            border: 2px solid #222;
            color: #fff;
            padding: 10px 12px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }
        .price-input:focus { border-color: #e63946; }
        .price-divider { color: #666; font-size: 14px; }

        .filter-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .btn-filter-apply {
            flex: 1;
            background: #e63946;
            color: #fff;
            border: none;
            padding: 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-filter-reset {
            background: none;
            border: 2px solid #444;
            color: #888;
            padding: 12px 16px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }

        /* ===== СЕТКА ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .product-card {
            background: #111;
            border: 3px solid #222;
            cursor: pointer;
            position: relative;
            transition: border 0.15s;
        }
        .product-card:active { border-color: #e63946; }

        .product-img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
        }

        .product-info { padding: 10px 12px 12px; }

        .product-brand {
            font-size: 11px;
            color: #e63946;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .product-name {
            font-size: 13px;
            color: #fff;
            text-transform: uppercase;
            line-height: 1.2;
            margin: 2px 0 4px;
        }

        .product-price {
            font-size: 18px;
            color: #fff;
            font-weight: 900;
        }

        .product-city {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .fav-icon-card {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 22px;
            cursor: pointer;
            z-index: 10;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        }

        /* ===== КАРТОЧКА ТОВАРА ===== */
        .back-btn {
            background: none;
            border: 3px solid #e63946;
            color: #e63946;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            padding: 10px 16px;
            cursor: pointer;
            margin-bottom: 16px;
            font-family: inherit;
            display: inline-block;
        }
        .back-btn:active { background: #e63946; color: #fff; }

        .product-gallery { margin-bottom: 16px; }
        .product-gallery img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border: 3px solid #222;
        }

        .product-brand-detail {
            font-size: 13px;
            color: #e63946;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .product-title {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .product-price-big {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .product-description {
            color: #999;
            line-height: 1.5;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .product-details {
            background: #111;
            border: 3px solid #222;
            margin-bottom: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 14px;
            border-bottom: 3px solid #222;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #e63946; font-weight: 900; text-transform: uppercase; font-size: 12px; }
        .detail-value { color: #fff; font-weight: 900; font-size: 12px; text-transform: uppercase; }

        .action-buttons { display: flex; gap: 10px; }

        .btn-primary {
            flex: 1;
            background: #e63946;
            color: #fff;
            border: none;
            padding: 14px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary:active { opacity: 0.8; }

        .btn-outline {
            flex: 1;
            background: none;
            border: 3px solid #fff;
            color: #fff;
            padding: 14px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-outline:active { background: #fff; color: #000; }

        /* ===== ИЗБРАННОЕ ===== */
        .fav-count-text { color: #e63946; font-size: 12px; margin-top: 2px; }

        /* ===== ПРОФИЛЬ (оставлено для будущего) ===== */

        /* ===== ПУСТО ===== */
        .empty-state { text-align: center; padding: 40px 16px; color: #555; }
        .empty-icon { font-size: 50px; margin-bottom: 10px; }

        /* ===== МЕНЮ ===== */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #0a0a0a;
            border-top: 3px solid #e63946;
            display: flex; justify-content: space-around;
            padding: 10px 0 12px;
            z-index: 100;
        }
        .nav-item {
            color: #444; text-align: center; cursor: pointer;
            font-weight: 900; text-transform: uppercase; font-size: 10px;
            transition: color 0.15s;
        }
        .nav-item.active { color: #e63946; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 1px; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <!-- ========== КАТАЛОГ ========== -->
    <div id="catalog-screen" class="screen active">
        <div class="header">
            <div class="logo">GLOWREP</div>
            <div class="subtitle">маркетплейс одежды</div>
        </div>

        <div class="search-row">
            <input type="text" class="search-bar" placeholder="ПОИСК ПО НАЗВАНИЮ..." id="search">
            <button class="filter-btn-search" id="filter-toggle" onclick="toggleFilters()">⚙</button>
        </div>

        <div class="active-filters" id="active-filters"></div>

        <div class="filter-panel" id="filter-panel">
            <div class="filter-section">
                <div class="filter-section-title">💰 Цена</div>
                <div class="price-row">
                    <input type="number" class="price-input" placeholder="ОТ" id="price-from">
                    <span class="price-divider">—</span>
                    <input type="number" class="price-input" placeholder="ДО" id="price-to">
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-section-title">📍 Город</div>
                <div class="filter-chips" id="city-chips">
                    <span class="filter-chip selected" data-value="">Все</span>
                    <span class="filter-chip" data-value="Москва">Москва</span>
                    <span class="filter-chip" data-value="СПб">СПб</span>
                    <span class="filter-chip" data-value="Казань">Казань</span>
                </div>
            </div>

            <div class="filter-actions">
                <button class="btn-filter-reset" onclick="resetFilters()">СБРОСИТЬ</button>
                <button class="btn-filter-apply" onclick="applyFilters()">ПРИМЕНИТЬ</button>
            </div>
        </div>

        <div class="products-grid" id="catalog-grid"></div>
        <div id="catalog-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">🔍</div><p>НИЧЕГО НЕ НАЙДЕНО</p>
        </div>
    </div>

    <!-- ========== КАРТОЧКА ========== -->
    <div id="product-screen" class="screen">
        <button class="back-btn" onclick="showScreen('catalog-screen')">← НАЗАД</button>
        <div class="product-gallery">
            <img src="" id="product-img">
        </div>
        <div class="product-brand-detail" id="product-brand-detail"></div>
        <div class="product-title" id="product-title"></div>
        <div class="product-price-big" id="product-price"></div>
        <div class="product-description" id="product-desc"></div>
        <div class="product-details" id="product-details"></div>
        <div class="action-buttons">
            <button class="btn-outline" id="fav-btn" onclick="toggleFav()">🤍 ИЗБРАННОЕ</button>
            <button class="btn-primary">💬 НАПИСАТЬ</button>
        </div>
    </div>

    <!-- ========== ИЗБРАННОЕ ========== -->
    <div id="favorites-screen" class="screen">
        <div class="header">
            <div class="logo" style="font-size:28px;">ИЗБРАННОЕ</div>
            <div class="fav-count-text" id="fav-count"></div>
        </div>
        <div class="products-grid" id="fav-grid"></div>
        <div id="fav-empty" class="empty-state" style="display:none;">
            <div class="empty-icon">💔</div><p>ПУСТО</p>
        </div>
    </div>

    <!-- ========== МЕНЮ ========== -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showScreen('catalog-screen')"><span class="nav-icon">🏠</span>Главная</div>
        <div class="nav-item" onclick="showScreen('favorites-screen')"><span class="nav-icon">❤️</span>Избранное</div>
        <div class="nav-item" onclick="alert('Скоро')"><span class="nav-icon">➕</span>Создать</div>
        <div class="nav-item" onclick="alert('Скоро')"><span class="nav-icon">👤</span>Профиль</div>
    </div>

    <script>
        // Глобальные переменные
        let products = [];
        let favs = JSON.parse(localStorage.getItem('glowrep_favs') || '[]');
        let curProd = null;
        let filtersOpen = false;
        let activeFilters = { city: '', priceFrom: '', priceTo: '' };

        // Загрузка товаров из API
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                products = await res.json();
                renderCatalog();
            } catch(e) {
                console.error('API error:', e);
                products = [];
                renderCatalog();
            }
        }

        // Навигация
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const navItem = document.querySelector(`.nav-item[onclick="showScreen('${id}')"]`);
            if (navItem) navItem.classList.add('active');
            if (id === 'favorites-screen') renderFav();
            if (id === 'catalog-screen') renderCatalog();
        }

        // Фильтры
        function toggleFilters() {
            filtersOpen = !filtersOpen;
            document.getElementById('filter-panel').classList.toggle('open', filtersOpen);
            document.getElementById('filter-toggle').classList.toggle('active', filtersOpen);
        }

        function applyFilters() {
            activeFilters.priceFrom = document.getElementById('price-from').value;
            activeFilters.priceTo = document.getElementById('price-to').value;
            
            const cityChip = document.querySelector('#city-chips .filter-chip.selected');
            activeFilters.city = cityChip ? cityChip.dataset.value : '';

            renderActiveFilterTags();
            toggleFilters();
            renderCatalog();
        }

        function resetFilters() {
            activeFilters = { city: '', priceFrom: '', priceTo: '' };
            document.getElementById('price-from').value = '';
            document.getElementById('price-to').value = '';
            document.querySelectorAll('#city-chips .filter-chip').forEach(c => c.classList.remove('selected'));
            document.querySelector('#city-chips .filter-chip[data-value=""]').classList.add('selected');
            renderActiveFilterTags();
            renderCatalog();
        }

        function renderActiveFilterTags() {
            const container = document.getElementById('active-filters');
            const tags = [];
            if (activeFilters.city) tags.push({ label: activeFilters.city, key: 'city' });
            if (activeFilters.priceFrom || activeFilters.priceTo) {
                tags.push({ label: `${activeFilters.priceFrom || '0'}-${activeFilters.priceTo || '∞'} ₽`, key: 'price' });
            }
            container.innerHTML = tags.map(t => 
                `<span class="active-filter-tag" onclick="removeFilter('${t.key}')">${t.label} <span>×</span></span>`
            ).join('');
        }

        function removeFilter(key) {
            if (key === 'price') {
                activeFilters.priceFrom = '';
                activeFilters.priceTo = '';
                document.getElementById('price-from').value = '';
                document.getElementById('price-to').value = '';
            } else {
                activeFilters[key] = '';
                document.querySelectorAll('#city-chips .filter-chip').forEach(c => c.classList.remove('selected'));
                document.querySelector('#city-chips .filter-chip[data-value=""]').classList.add('selected');
            }
            renderActiveFilterTags();
            renderCatalog();
        }

        // Клики по чипсам города
        document.getElementById('city-chips').addEventListener('click', function(e) {
            if (e.target.classList.contains('filter-chip')) {
                document.querySelectorAll('#city-chips .filter-chip').forEach(c => c.classList.remove('selected'));
                e.target.classList.add('selected');
                activeFilters.city = e.target.dataset.value;
            }
        });

        // Каталог
        function renderCatalog() {
            let p = [...products];
            const q = document.getElementById('search').value.toLowerCase();
            if (q) p = p.filter(x => x.title.toLowerCase().includes(q));
            if (activeFilters.city) p = p.filter(x => x.city === activeFilters.city);
            if (activeFilters.priceFrom) p = p.filter(x => x.price >= Number(activeFilters.priceFrom));
            if (activeFilters.priceTo) p = p.filter(x => x.price <= Number(activeFilters.priceTo));

            const grid = document.getElementById('catalog-grid');
            const empty = document.getElementById('catalog-empty');
            
            if (p.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
            } else {
                empty.style.display = 'none';
                grid.innerHTML = p.map(x => {
                    const isFav = favs.includes(x.id);
                    return `
                    <div class="product-card">
                        <span class="fav-icon-card" onclick="event.stopPropagation(); toggleFavById('${x.id}'); renderCatalog();">${isFav ? '❤️' : '🤍'}</span>
                        <div onclick="openProd('${x.id}')">
                            <img src="${x.photo || 'https://via.placeholder.com/400/1a1a2e/ff2d95?text=GLOW'}" class="product-img" alt="${x.title}" onerror="this.src='https://via.placeholder.com/400/1a1a2e/ff2d95?text=GLOW'">
                            <div class="product-info">
                                <div class="product-brand">GLOWREP</div>
                                <div class="product-name">${x.title}</div>
                                <div class="product-price">${x.price.toLocaleString()} ₽</div>
                                <div class="product-city">📍 ${x.city}</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        function toggleFavById(id) {
            const i = favs.indexOf(id);
            if (i > -1) {
                favs.splice(i, 1);
            } else {
                favs.push(id);
            }
            localStorage.setItem('glowrep_favs', JSON.stringify(favs));
            if (curProd && curProd.id === id) updateFavBtn();
        }

        function openProd(id) {
            curProd = products.find(x => x.id === id);
            if (!curProd) return;
            
            document.getElementById('product-img').src = curProd.photo || 'https://via.placeholder.com/400/1a1a2e/ff2d95?text=GLOW';
            document.getElementById('product-brand-detail').textContent = 'GLOWREP';
            document.getElementById('product-title').textContent = curProd.title;
            document.getElementById('product-price').textContent = curProd.price.toLocaleString() + ' ₽';
            document.getElementById('product-desc').textContent = curProd.description || 'Описание отсутствует';
            document.getElementById('product-details').innerHTML = `
                <div class="detail-row"><span class="detail-label">Город</span><span class="detail-value">${curProd.city}</span></div>
                <div class="detail-row"><span class="detail-label">Цена</span><span class="detail-value">${curProd.price.toLocaleString()} ₽</span></div>
                <div class="detail-row"><span class="detail-label">Дата</span><span class="detail-value">${new Date(curProd.created_at).toLocaleDateString('ru-RU')}</span></div>
            `;
            updateFavBtn();
            showScreen('product-screen');
        }

        function toggleFav() {
            if (!curProd) return;
            toggleFavById(curProd.id);
            updateFavBtn();
        }

        function updateFavBtn() {
            const btn = document.getElementById('fav-btn');
            if (!curProd) return;
            btn.textContent = favs.includes(curProd.id) ? '❤️ В ИЗБРАННОМ' : '🤍 ИЗБРАННОЕ';
        }

        function renderFav() {
            const p = products.filter(x => favs.includes(x.id));
            document.getElementById('fav-count').textContent = p.length + ' ТОВАРОВ';
            const grid = document.getElementById('fav-grid');
            if (p.length === 0) {
                grid.innerHTML = '';
                document.getElementById('fav-empty').style.display = 'block';
            } else {
                document.getElementById('fav-empty').style.display = 'none';
                grid.innerHTML = p.map(x => {
                    const isFav = favs.includes(x.id);
                    return `
                    <div class="product-card">
                        <span class="fav-icon-card" onclick="event.stopPropagation(); toggleFavById('${x.id}'); renderFav();">${isFav ? '❤️' : '🤍'}</span>
                        <div onclick="openProd('${x.id}')">
                            <img src="${x.photo || 'https://via.placeholder.com/400/1a1a2e/ff2d95?text=GLOW'}" class="product-img" alt="${x.title}" onerror="this.src='https://via.placeholder.com/400/1a1a2e/ff2d95?text=GLOW'">
                            <div class="product-info">
                                <div class="product-brand">GLOWREP</div>
                                <div class="product-name">${x.title}</div>
                                <div class="product-price">${x.price.toLocaleString()} ₽</div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        document.getElementById('search').addEventListener('input', renderCatalog);

        // Старт
        loadProducts();
    </script>
</body>
</html>
