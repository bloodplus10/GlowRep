<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLOWREP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            z-index: 100;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: var(--tg-theme-button-color, #2481cc);
            background: rgba(36, 129, 204, 0.1);
        }
        
        /* Контент вкладок */
        .tab-content {
            display: none;
            padding: 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Карточка товара */
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #e0e0e0;
        }
        
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #2481cc);
            margin-top: 4px;
        }
        
        .product-city {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666666);
            margin-top: 4px;
        }
        
        /* Форма создания */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn:active {
            opacity: 0.8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        /* Профиль */
        .profile-info {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .profile-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666666);
        }
    </style>
</head>
<body>
    <!-- Вкладки -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="catalog">📦 Каталог</button>
        <button class="tab-btn" data-tab="create">➕ Создать</button>
        <button class="tab-btn" data-tab="favorites">❤️ Избранное</button>
        <button class="tab-btn" data-tab="profile">👤 Профиль</button>
    </div>
    
    <!-- Каталог -->
    <div id="catalog" class="tab-content active">
        <div id="catalog-loading" class="loading">Загрузка...</div>
        <div id="catalog-list"></div>
    </div>
    
    <!-- Создание объявления -->
    <div id="create" class="tab-content">
        <form id="create-form">
            <div class="form-group">
                <label>Название товара *</label>
                <input type="text" id="title" required placeholder="Например: Футболка Nike">
            </div>
            <div class="form-group">
                <label>Цена *</label>
                <input type="number" id="price" required placeholder="1000">
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Санкт-Петербург">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="category_id">
                    <option value="1">Одежда</option>
                    <option value="2">Обувь</option>
                    <option value="3">Аксессуары</option>
                </select>
            </div>
            <div class="form-group">
                <label>Описание *</label>
                <textarea id="description" required placeholder="Опишите товар..."></textarea>
            </div>
            <div class="form-group">
                <label>Фото</label>
                <input type="file" id="photo" accept="image/*">
            </div>
            <button type="submit" class="btn">Создать объявление</button>
        </form>
    </div>
    
    <!-- Избранное -->
    <div id="favorites" class="tab-content">
        <div id="favorites-loading" class="loading">Загрузка...</div>
        <div id="favorites-list"></div>
    </div>
    
    <!-- Профиль -->
    <div id="profile" class="tab-content">
        <div id="profile-info" class="loading">Загрузка...</div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let initData = tg.initData;
        let userId = tg.initDataUnsafe?.user?.id;
        
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                
                if (tabName === 'catalog') loadCatalog();
                if (tabName === 'favorites') loadFavorites();
                if (tabName === 'profile') loadProfile();
            });
        });
        
        // Загрузка каталога
        async function loadCatalog() {
            const container = document.getElementById('catalog-list');
            const loading = document.getElementById('catalog-loading');
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                loading.style.display = 'none';
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="empty">😕 Ничего не найдено. Создайте первое объявление!</div>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <div class="product-card" onclick="viewProduct('${p.id}')">
                        ${p.photo ? `<img class="product-image" src="${p.photo}" onerror="this.src='https://placehold.co/300x200?text=No+Image'">` : '<div class="product-image" style="background:#e0e0e0; display:flex;align-items:center;justify-content:center;">📷 Нет фото</div>'}
                        <div class="product-title">${escapeHtml(p.title)}</div>
                        <div class="product-price">${p.price.toLocaleString()} ₽</div>
                        <div class="product-city">📍 ${p.city || 'Не указан'}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        // Загрузка избранного
        async function loadFavorites() {
            const container = document.getElementById('favorites-list');
            const loading = document.getElementById('favorites-loading');
            try {
                const response = await fetch(`/api/favorites?user_id=${userId}&init_data=${encodeURIComponent(initData)}`);
                const products = await response.json();
                loading.style.display = 'none';
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="empty">❤️ Нет избранных товаров</div>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <div class="product-card" onclick="viewProduct('${p.id}')">
                        ${p.photo ? `<img class="product-image" src="${p.photo}">` : '<div class="product-image">📷</div>'}
                        <div class="product-title">${escapeHtml(p.title)}</div>
                        <div class="product-price">${p.price} ₽</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        // Загрузка профиля
        async function loadProfile() {
            const container = document.getElementById('profile-info');
            try {
                const response = await fetch(`/api/profile?user_id=${userId}&init_data=${encodeURIComponent(initData)}`);
                const user = await response.json();
                
                container.innerHTML = `
                    <div class="profile-info">
                        <div class="profile-name">${escapeHtml(user.first_name || 'Пользователь')}</div>
                        ${user.username ? `<div style="color:#666">@${user.username}</div>` : ''}
                    </div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${user.ads_count || 0}</div>
                            <div class="stat-label">Объявлений</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${user.favorites_count || 0}</div>
                            <div class="stat-label">В избранном</div>
                        </div>
                    </div>
                    <button class="btn" onclick="logout()">Выйти из аккаунта</button>
                `;
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки профиля</div>';
            }
        }
        
        // Создание объявления
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('city', document.getElementById('city').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('init_data', initData);
            
            const photoFile = document.getElementById('photo').files[0];
            if (photoFile) formData.append('photo', photoFile);
            
            const btn = e.target.querySelector('.btn');
            btn.textContent = 'Создаём...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/create-product', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    tg.showPopup({
                        title: 'Успех!',
                        message: 'Объявление создано и отправлено на модерацию',
                        buttons: [{type: 'ok'}]
                    });
                    document.getElementById('create-form').reset();
                    loadCatalog();
                    document.querySelector('[data-tab="catalog"]').click();
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: e.message,
                    buttons: [{type: 'ok'}]
                });
            } finally {
                btn.textContent = 'Создать объявление';
                btn.disabled = false;
            }
        });
        
        function viewProduct(id) {
            tg.showPopup({
                title: 'Просмотр',
                message: 'Функция просмотра товара в разработке',
                buttons: [{type: 'ok'}]
            });
        }
        
        function logout() {
            tg.close();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Загружаем каталог при старте
        loadCatalog();
    </script>
</body>
</html>
