<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLOWREP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
        }
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            z-index: 100;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: var(--tg-theme-button-color, #2481cc);
            background: rgba(36, 129, 204, 0.1);
        }
        
        .tab-content {
            display: none;
            padding: 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Карточка товара */
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            position: relative;
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #e0e0e0;
        }
        
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #2481cc);
            margin-top: 4px;
        }
        
        /* Форма создания */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--tg-theme-hint-color, #666666);
            font-weight: 500;
        }
        
        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 10px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            box-sizing: border-box;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .form-row {
            display: flex;
            gap: 12px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        
        .btn:active {
            opacity: 0.8;
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        /* Профиль */
        .profile-header {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .profile-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        /* Toast уведомления */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 200;
            display: none;
        }
        
        /* Категории в каталоге */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 0 0 12px 0;
            margin-bottom: 16px;
            white-space: nowrap;
        }
        
        .category-chip {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .category-chip.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }
        
        /* Поиск */
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        
        /* Мои объявления */
        .my-ad-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .small-btn {
            flex: 1;
            padding: 8px;
            font-size: 12px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .small-btn.edit {
            background: #ffc107;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="catalog">📦 Каталог</button>
        <button class="tab-btn" data-tab="create">➕ Создать</button>
        <button class="tab-btn" data-tab="myads">📋 Мои</button>
        <button class="tab-btn" data-tab="profile">👤 Профиль</button>
    </div>
    
    <!-- Каталог -->
    <div id="catalog" class="tab-content active">
        <input type="text" id="search-input" class="search-box" placeholder="🔍 Поиск товаров...">
        <div class="categories" id="categories">
            <span class="category-chip active" data-cat="all">Все</span>
            <span class="category-chip" data-cat="1">Одежда</span>
            <span class="category-chip" data-cat="2">Обувь</span>
            <span class="category-chip" data-cat="3">Аксессуары</span>
        </div>
        <div id="catalog-loading" class="loading">Загрузка...</div>
        <div id="catalog-list"></div>
    </div>
    
    <!-- Создание объявления -->
    <div id="create" class="tab-content">
        <form id="create-form">
            <div class="form-group">
                <label>📝 Название товара *</label>
                <input type="text" id="title" required placeholder="Пример: Футболка Nike">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>💰 Цена *</label>
                    <input type="number" id="price" required placeholder="1000">
                </div>
                <div class="form-group">
                    <label>📍 Город</label>
                    <input type="text" id="city" placeholder="Москва">
                </div>
            </div>
            <div class="form-group">
                <label>🏷️ Категория</label>
                <select id="category_id">
                    <option value="1">Одежда</option>
                    <option value="2">Обувь</option>
                    <option value="3">Аксессуары</option>
                </select>
            </div>
            <div class="form-group">
                <label>📄 Описание *</label>
                <textarea id="description" required placeholder="Опишите товар: состояние, размер, особенности..."></textarea>
            </div>
            <div class="form-group">
                <label>🖼️ Фото</label>
                <input type="file" id="photo" accept="image/*">
                <div id="photo-preview" style="margin-top:8px;"></div>
            </div>
            <button type="submit" class="btn">✅ Создать объявление</button>
        </form>
    </div>
    
    <!-- Мои объявления -->
    <div id="myads" class="tab-content">
        <div id="myads-loading" class="loading">Загрузка...</div>
        <div id="myads-list"></div>
    </div>
    
    <!-- Профиль -->
    <div id="profile" class="tab-content">
        <div id="profile-loading" class="loading">Загрузка...</div>
        <div id="profile-content"></div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || null;
        
        let currentProducts = [];
        let currentCategory = 'all';
        let currentSearch = '';
        
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }
        
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                
                if (tabName === 'catalog') loadCatalog();
                if (tabName === 'myads') loadMyAds();
                if (tabName === 'profile') loadProfile();
            });
        });
        
        // Фильтрация товаров
        function filterProducts() {
            let filtered = [...currentProducts];
            
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category_id == currentCategory);
            }
            
            if (currentSearch) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            
            return filtered;
        }
        
        function renderCatalog() {
            const container = document.getElementById('catalog-list');
            const products = filterProducts();
            
            if (products.length === 0) {
                container.innerHTML = '<div class="empty">😕 Ничего не найдено</div>';
                return;
            }
            
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="viewProduct('${p.id}')">
                    ${p.photo ? `<img class="product-image" src="${p.photo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22%3E%3Crect width=%22300%22 height=%22200%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%22150%22 y=%22100%22 text-anchor=%22middle%22 fill=%22%23999%22%3E📷%3C/text%3E%3C/svg%3E'">` : '<div class="product-image" style="display:flex;align-items:center;justify-content:center;">📷 Нет фото</div>'}
                    <div class="product-title">${escapeHtml(p.title)}</div>
                    <div class="product-price">${formatPrice(p.price)} ₽</div>
                </div>
            `).join('');
        }
        
        async function loadCatalog() {
            try {
                const response = await fetch('/api/products');
                currentProducts = await response.json();
                document.getElementById('catalog-loading').style.display = 'none';
                renderCatalog();
            } catch (e) {
                console.error(e);
                document.getElementById('catalog-list').innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        // Загрузка моих объявлений
        async function loadMyAds() {
            if (!userId) {
                document.getElementById('myads-list').innerHTML = '<div class="empty">👤 Войдите в Telegram, чтобы видеть свои объявления</div>';
                return;
            }
            
            try {
                const response = await fetch(`/api/my-ads?user_id=${userId}`);
                const ads = await response.json();
                const container = document.getElementById('myads-list');
                document.getElementById('myads-loading').style.display = 'none';
                
                if (ads.length === 0) {
                    container.innerHTML = '<div class="empty">📭 У вас пока нет объявлений</div>';
                    return;
                }
                
                container.innerHTML = ads.map(ad => `
                    <div class="product-card">
                        <div class="product-title">${escapeHtml(ad.title)}</div>
                        <div class="product-price">${formatPrice(ad.price)} ₽</div>
                        <div class="my-ad-actions">
                            <button class="small-btn edit" onclick="event.stopPropagation(); editAd('${ad.id}')">✏️ Редактировать</button>
                            <button class="small-btn" onclick="event.stopPropagation(); deleteAd('${ad.id}')">🗑️ Удалить</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                document.getElementById('myads-list').innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        // Создание объявления
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!userId) {
                showToast('❌ Ошибка: не удалось определить пользователя');
                return;
            }
            
            const title = document.getElementById('title').value.trim();
            const price = document.getElementById('price').value;
            const city = document.getElementById('city').value;
            const categoryId = document.getElementById('category_id').value;
            const description = document.getElementById('description').value.trim();
            const photoFile = document.getElementById('photo').files[0];
            
            if (!title || !price || !description) {
                showToast('⚠️ Заполните все обязательные поля');
                return;
            }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('price', price);
            formData.append('city', city);
            formData.append('category_id', categoryId);
            formData.append('description', description);
            formData.append('user_id', userId);
            if (photoFile) formData.append('photo', photoFile);
            
            const btn = e.target.querySelector('.btn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Создаём...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/create-product', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ Объявление создано!');
                    document.getElementById('create-form').reset();
                    document.getElementById('photo-preview').innerHTML = '';
                    loadCatalog();
                    loadMyAds();
                    document.querySelector('[data-tab="catalog"]').click();
                } else {
                    throw new Error(result.error || 'Ошибка создания');
                }
            } catch (err) {
                showToast('❌ ' + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
        
        // Превью фото
        document.getElementById('photo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const preview = document.getElementById('photo-preview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.innerHTML = `<img src="${event.target.result}" style="max-width:100%;max-height:150px;border-radius:8px;">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });
        
        // Загрузка профиля
        async function loadProfile() {
            if (!userId) {
                document.getElementById('profile-content').innerHTML = `
                    <div class="profile-header">
                        <div class="profile-name">👤 Гость</div>
                        <div>Войдите в Telegram, чтобы использовать все функции</div>
                    </div>
                `;
                document.getElementById('profile-loading').style.display = 'none';
                return;
            }
            
            try {
                const response = await fetch(`/api/profile?user_id=${userId}`);
                const userData = await response.json();
                document.getElementById('profile-loading').style.display = 'none';
                
                document.getElementById('profile-content').innerHTML = `
                    <div class="profile-header">
                        <div class="profile-name">${escapeHtml(userData.first_name || 'Пользователь')}</div>
                        <div>🆔 ID: ${userId}</div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${userData.ads_count || 0}</div>
                            <div class="stat-label">Объявлений</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${userData.favorites_count || 0}</div>
                            <div class="stat-label">Избранных</div>
                        </div>
                    </div>
                    <button class="btn btn-secondary" onclick="tg.close()">🚪 Закрыть</button>
                `;
            } catch (e) {
                console.error(e);
                document.getElementById('profile-content').innerHTML = '<div class="empty">❌ Ошибка загрузки</div>';
            }
        }
        
        // Поиск
        document.getElementById('search-input').addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderCatalog();
        });
        
        // Категории
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentCategory = chip.dataset.cat;
                renderCatalog();
            });
        });
        
        function viewProduct(id) {
            tg.showPopup({
                title: 'Товар',
                message: `ID: ${id}\nФункция просмотра в разработке`,
                buttons: [{type: 'ok'}]
            });
        }
        
        async function deleteAd(adId) {
            if (!confirm('Удалить объявление? Это действие нельзя отменить.')) return;
            
            try {
                const response = await fetch('/api/delete-ad', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ad_id: adId, user_id: userId})
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ Объявление удалено');
                    loadMyAds();
                    loadCatalog();
                } else {
                    showToast('❌ Ошибка удаления');
                }
            } catch (e) {
                showToast('❌ Ошибка');
            }
        }
        
        function editAd(adId) {
            tg.showPopup({
                title: 'Редактирование',
                message: 'Функция редактирования в разработке',
                buttons: [{type: 'ok'}]
            });
        }
        
        function formatPrice(price) {
            return Number(price).toLocaleString('ru-RU');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Загружаем каталог при старте
        loadCatalog();
        if (userId) loadProfile();
    </script>
</body>
</html>
