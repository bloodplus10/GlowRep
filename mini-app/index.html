<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLOWREP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding-bottom: 70px;
        }
        
        /* Tab Bar */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            z-index: 100;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: var(--tg-theme-button-color, #2481cc);
            background: rgba(36, 129, 204, 0.1);
        }
        
        .tab-content {
            display: none;
            padding: 16px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Product Card */
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.1s;
            position: relative;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }
        
        .favorite-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            background: #e0e0e0;
        }
        
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #2481cc);
            margin-top: 4px;
        }
        
        .product-city {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666666);
            margin-top: 4px;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        .form-group input, 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn:active {
            opacity: 0.8;
        }
        
        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        /* Profile */
        .profile-header {
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .profile-name {
            font-size: 20px;
            font-weight: 600;
        }
        
        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666666);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 16px;
            padding: 20px;
            max-width: 90%;
            width: 320px;
            max-height: 80%;
            overflow-y: auto;
        }
        
        .modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .close-modal {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="catalog">📦 Каталог</button>
        <button class="tab-btn" data-tab="create">➕ Создать</button>
        <button class="tab-btn" data-tab="profile">👤 Профиль</button>
    </div>
    
    <!-- Catalog Tab -->
    <div id="catalog" class="tab-content active">
        <div id="catalog-loading" class="loading">Загрузка товаров...</div>
        <div id="catalog-list"></div>
    </div>
    
    <!-- Create Tab -->
    <div id="create" class="tab-content">
        <form id="create-form">
            <div class="form-group">
                <label>Название товара *</label>
                <input type="text" id="title" required placeholder="Например: Футболка Nike">
            </div>
            <div class="form-group">
                <label>Цена *</label>
                <input type="number" id="price" required placeholder="1000">
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" id="city" placeholder="Москва">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="category_id">
                    <option value="1">Одежда</option>
                    <option value="2">Обувь</option>
                    <option value="3">Аксессуары</option>
                    <option value="4">Другое</option>
                </select>
            </div>
            <div class="form-group">
                <label>Описание *</label>
                <textarea id="description" required placeholder="Опишите товар..."></textarea>
            </div>
            <div class="form-group">
                <label>Фото</label>
                <input type="file" id="photo" accept="image/*">
                <div id="photo-preview" style="margin-top:8px;"></div>
            </div>
            <button type="submit" class="btn">Создать объявление</button>
        </form>
    </div>
    
    <!-- Profile Tab -->
    <div id="profile" class="tab-content">
        <div id="profile-loading" class="loading">Загрузка профиля...</div>
        <div id="profile-content"></div>
    </div>
    
    <!-- Product Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <div id="modal-product"></div>
            <button class="btn close-modal" onclick="closeProductModal()">Закрыть</button>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Получаем реального пользователя из Telegram
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || null;
        const userFirstName = user?.first_name || 'Пользователь';
        
        let currentProducts = [];
        
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                
                if (tabName === 'catalog') loadCatalog();
                if (tabName === 'profile') loadProfile();
            });
        });
        
        // Загрузка каталога
        async function loadCatalog() {
            const container = document.getElementById('catalog-list');
            const loading = document.getElementById('catalog-loading');
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                currentProducts = products;
                loading.style.display = 'none';
                
                if (products.length === 0) {
                    container.innerHTML = '<div class="empty">😕 Пока нет товаров. Создайте первое объявление!</div>';
                    return;
                }
                
                container.innerHTML = products.map(p => `
                    <div class="product-card" onclick="showProductModal('${p.id}')">
                        ${p.photo ? `<img class="product-image" src="${p.photo}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22%3E%3Crect width=%22300%22 height=%22200%22 fill=%22%23e0e0e0%22/%3E%3Ctext x=%22150%22 y=%22100%22 text-anchor=%22middle%22 fill=%22%23999%22%3E📷%3C/text%3E%3C/svg%3E'">` : '<div class="product-image" style="display:flex;align-items:center;justify-content:center;">📷 Нет фото</div>'}
                        <div class="product-title">${escapeHtml(p.title)}</div>
                        <div class="product-price">${formatPrice(p.price)} ₽</div>
                        <div class="product-city">📍 ${escapeHtml(p.city) || 'Не указан'}</div>
                        <button class="favorite-btn" onclick="event.stopPropagation(); toggleFavorite('${p.id}', this)">❤️</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки каталога</div>';
            }
        }
        
        // Показать товар в модалке
        async function showProductModal(productId) {
            const product = currentProducts.find(p => p.id === productId);
            if (!product) return;
            
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-product');
            
            modalContent.innerHTML = `
                ${product.photo ? `<img src="${product.photo}" style="width:100%;border-radius:8px;margin-bottom:12px;">` : ''}
                <div style="font-size:20px;font-weight:600;margin-bottom:8px">${escapeHtml(product.title)}</div>
                <div style="font-size:24px;font-weight:700;color:var(--tg-theme-button-color);margin-bottom:8px">${formatPrice(product.price)} ₽</div>
                <div style="margin-bottom:8px">📍 ${escapeHtml(product.city) || 'Не указан'}</div>
                <div style="margin-bottom:8px">📅 ${new Date(product.created_at).toLocaleDateString()}</div>
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid #eee">${escapeHtml(product.description) || 'Описание отсутствует'}</div>
            `;
            
            modal.classList.add('active');
        }
        
        function closeProductModal() {
            document.getElementById('product-modal').classList.remove('active');
        }
        
        // Добавить/удалить из избранного
        async function toggleFavorite(productId, btn) {
            if (!userId) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Не удалось определить пользователя',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            try {
                const response = await fetch('/api/toggle-favorite', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: userId,
                        ad_id: parseInt(productId)
                    })
                });
                const result = await response.json();
                
                if (result.success) {
                    btn.style.color = result.action === 'added' ? 'red' : 'gray';
                    if (result.action === 'added') {
                        tg.showPopup({title: 'Добавлено', message: 'Товар добавлен в избранное', buttons: [{type: 'ok'}], timer: 1500});
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        // Создание объявления
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!userId) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Пожалуйста, перезапустите приложение',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const city = document.getElementById('city').value;
            const categoryId = document.getElementById('category_id').value;
            const description = document.getElementById('description').value;
            const photoFile = document.getElementById('photo').files[0];
            
            if (!title || !price || !description) {
                tg.showPopup({title: 'Ошибка', message: 'Заполните обязательные поля', buttons: [{type: 'ok'}]});
                return;
            }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('price', price);
            formData.append('city', city);
            formData.append('category_id', categoryId);
            formData.append('description', description);
            formData.append('user_id', userId);
            formData.append('init_data', tg.initData);
            if (photoFile) formData.append('photo', photoFile);
            
            const btn = e.target.querySelector('.btn');
            const originalText = btn.textContent;
            btn.textContent = 'Создаём...';
            btn.disabled = true;
            
            try {
                const response = await fetch('/api/create-product', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    tg.showPopup({
                        title: 'Успех!',
                        message: 'Объявление создано и отправлено на модерацию',
                        buttons: [{type: 'ok'}]
                    });
                    document.getElementById('create-form').reset();
                    document.getElementById('photo-preview').innerHTML = '';
                    loadCatalog();
                    document.querySelector('[data-tab="catalog"]').click();
                } else {
                    throw new Error(result.error || 'Ошибка создания');
                }
            } catch (e) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: e.message,
                    buttons: [{type: 'ok'}]
                });
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
        
        // Превью фото
        document.getElementById('photo').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const preview = document.getElementById('photo-preview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.innerHTML = `<img src="${event.target.result}" style="max-width:100%;max-height:150px;border-radius:8px;">`;
                };
                reader.readAsDataURL(file);
            } else {
                preview.innerHTML = '';
            }
        });
        
        // Загрузка профиля
        async function loadProfile() {
            const container = document.getElementById('profile-content');
            const loading = document.getElementById('profile-loading');
            
            if (!userId) {
                loading.style.display = 'none';
                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-name">Гость</div>
                        <div>Войдите в Telegram чтобы использовать все функции</div>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch(`/api/profile?user_id=${userId}`);
                const userData = await response.json();
                loading.style.display = 'none';
                
                container.innerHTML = `
                    <div class="profile-header">
                        <div class="profile-name">${escapeHtml(userData.first_name || userFirstName)}</div>
                        ${userData.username ? `<div style="color:#666">@${userData.username}</div>` : ''}
                    </div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${userData.ads_count || 0}</div>
                            <div class="stat-label">Объявлений</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${userData.favorites_count || 0}</div>
                            <div class="stat-label">В избранном</div>
                        </div>
                    </div>
                    <button class="btn" onclick="shareProfile()">📤 Поделиться профилем</button>
                    <button class="btn" style="margin-top:12px;background:#dc3545" onclick="tg.close()">🚪 Закрыть</button>
                `;
            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="empty">❌ Ошибка загрузки профиля</div>';
            }
        }
        
        function shareProfile() {
            tg.showPopup({
                title: 'Поделиться',
                message: `Привет! Я в GLOWREP\nМой ID: ${userId}`,
                buttons: [{type: 'ok'}]
            });
        }
        
        function formatPrice(price) {
            return Number(price).toLocaleString('ru-RU');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Загружаем каталог при старте
        loadCatalog();
        
        // Показываем кнопку Main Button если нужно
        if (user) {
            tg.MainButton.setText('GLOWREP').show();
        }
    </script>
</body>
</html>
